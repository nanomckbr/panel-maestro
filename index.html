<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Maestro</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; background:#f5f7fb; margin:0; }
.container { padding:20px; }
button { padding:10px; border:none; background:#f59e0b; color:white; border-radius:8px; cursor:pointer; }
.card { background:white; padding:15px; margin:10px 0; border-radius:10px; }
</style>
</head>

<body>
<div class="container">
<h1>Panel Maestro</h1>
<button onclick="crearLocal()">+ Crear local</button>

<div id="lista"></div>
</div>

<script>
const SUPABASE_URL = "https://bkycmybpouygdvyuczqu.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_WJN6L01FPmlusK0Eci3lig_0o-e1UVh";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function crearLocal() {
  const nombre = prompt("Nombre del local:");
  if (!nombre) return;

  const slug = nombre.toLowerCase().replace(/\s+/g, "-");

  const { error } = await supabase.from("stores").insert([{
    name: nombre,
    slug: slug,
    whatsapp: "",
    description: "",
    primary_color: "#f59e0b",
    is_active: true
  }]);

  if (error) {
    alert("Error: " + error.message);
    return;
  }

  cargarLocales();
}

async function cargarLocales() {
  const { data } = await supabase.from("stores").select("*");

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  data.forEach(local => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <strong>${local.name}</strong><br>
      slug: ${local.slug}<br>
      <button onclick="eliminar('${local.id}')">Eliminar</button>
    `;
    lista.appendChild(div);
  });
}

async function eliminar(id) {
  await supabase.from("stores").delete().eq("id", id);
  cargarLocales();
}

cargarLocales();
</script>

</body>
</html>
